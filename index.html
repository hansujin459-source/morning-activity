<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>아침 다이어리 생성기</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 25px;
      background-color: #ffeef3;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,.45) 50%, transparent 50%),
        linear-gradient(rgba(255,255,255,.45) 50%, transparent 50%);
      background-size: 24px 24px;
    }

    h1 {
      text-align: center;
      color: #d85f78;
      font-size: 46px;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 30px;
      font-size: 17px;
    }

    h3 {
      color: #c94f68;
    }

    .button-area {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 25px;
    }

    button {
      padding: 12px 17px;
      border: none;
      background-color: #d85f78;
      color: white;
      border-radius: 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 4px 0 #b94b61;
      white-space: nowrap;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      background-color: #e8728a;
    }

    #worksheet {
      max-width: 820px;
      margin: 25px auto;
      background-color: #fffdfd;
      border: 3px solid #d85f78;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 8px 18px rgba(216,95,120,0.16);
    }

    #worksheet h2 {
      color: #d85f78;
      font-size: 32px;
      margin-bottom: 12px;
    }

    .date-box {
      color: #d85f78;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .info {
      margin-bottom: 10px;
      line-height: 1.7;
      font-size: 16px;
    }

    .question {
      background-color: white;
      border: 2px dashed #d85f78;
      border-radius: 16px;
      padding: 12px;
      margin-top: 10px;
      min-height: 75px;
      line-height: 1.6;
      font-size: 16px;
      position: relative;
      white-space: pre-line;
    }

    .question-title {
      color: #d85f78;
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 8px;
      padding-right: 55px;
    }

    .delete-btn {
      position: absolute;
      right: 10px;
      top: 10px;
      background-color: #f3b4c1;
      box-shadow: none;
      padding: 5px 8px;
      font-size: 11px;
      border-radius: 10px;
    }

    .memo-box {
      margin-top: 14px;
      border: 2px dashed #d85f78;
      border-radius: 16px;
      padding: 14px;
      min-height: 55px;
      background-color: #fff7f9;
      font-size: 16px;
    }

    @media print {
      @page {
        size: A4;
        margin: 12mm;
      }

      body {
        background: white;
        padding: 0;
      }

      h1, .subtitle, h3, .button-area {
        display: none;
      }

      #worksheet {
        box-shadow: none;
        margin: 0;
        max-width: none;
        border-radius: 18px;
        padding: 22px;
      }

      .delete-btn {
        display: none;
      }
    }
  </style>
</head>

<body>

  <h1>🐰 아침 다이어리 생성기 🐰</h1>
  <p class="subtitle">오늘의 기분과 생각을 기록해보세요 ✨</p>

  <h3>질문 선택하기</h3>

  <div class="button-area">
    <button onclick="addRandomMoodQuestion()">☁ 기분 질문</button>
    <button onclick="addRandomStudyQuestion()">📚 학업 질문</button>
    <button onclick="addRandomFunQuestion()">😂 유머 질문</button>
    <button onclick="addRandomCharacterQuestion()">🌱 인성 질문</button>
    <button onclick="addRandomWritingQuote()">✍ 아침 필사</button>
    <button onclick="addRandomAll()">🎲 영역별 랜덤</button>
    <button onclick="clearQuestions()">🧹 전체 삭제</button>
    <button onclick="window.print()">🖨 인쇄 / PDF 저장</button>
  </div>

  <div id="worksheet">

    function setTodayDate() {
      const today = new Date();
      const days = ["일", "월", "화", "수", "목", "금", "토"];
      const text = `${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일 ${days[today.getDay()]}요일`;
      document.getElementById("todayDate").innerText = "날짜: " + text;
    }

    function addQuestion(question) {
      const div = document.getElementById("questions");
      const questionBox = document.createElement("div");

      questionBox.className = "question";

     questionBox.innerHTML = `
    <button class="delete-btn" onclick="this.parentElement.remove()">삭제</button>
    <div class="question-title">${question}</div>

    ___________________________________________
    <br>
    ___________________________________________
    <br>
    ___________________________________________
  `;

  div.appendChild(questionBox);
}

    function getRandomQuestion(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function addRandomMoodQuestion() {
      addQuestion(getRandomQuestion(moodQuestions));
    }

    function addRandomStudyQuestion() {
      addQuestion(getRandomQuestion(studyQuestions));
    }

    function addRandomFunQuestion() {
      addQuestion(getRandomQuestion(funQuestions));
    }

    function addRandomCharacterQuestion() {
      addQuestion(getRandomQuestion(characterQuestions));
    }

    function addRandomWritingQuote() {
      addQuestion(getRandomQuestion(writingQuotes));
    }

    function addRandomAll() {
      addRandomMoodQuestion();
      addRandomStudyQuestion();
      addRandomFunQuestion();
      addRandomCharacterQuestion();
    }
