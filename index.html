<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>아침 활동지 생성기</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 30px;
      background-color: #f5f5f5;
    }

    h1 {
      color: #4f46e5;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      background-color: #4f46e5;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #4338ca;
    }

    #worksheet {
      margin-top: 30px;
      background-color: white;
      border: 1px solid #ddd;
      padding: 25px;
      border-radius: 12px;
    }

    .question {
      margin-top: 20px;
      line-height: 2;
    }
  </style>
</head>

<body>

  <h1>🌞 아침 활동지 생성기</h1>

  <h3>질문 선택하기</h3>

  <button onclick="addQuestion('오늘 가장 기대되는 일은 무엇인가요?')">
    기대되는 일
  </button>

  <button onclick="addQuestion('어제 내가 가장 많이 웃었던 순간은?')">
    웃었던 순간
  </button>

  <button onclick="addQuestion('오늘 친구에게 해주고 싶은 말은?')">
    친구에게 한마디
  </button>

  <button onclick="window.print()">
    🖨 인쇄 / PDF 저장
  </button>

  <div id="worksheet">

    <h2>오늘의 아침 활동지</h2>

    <p>날짜: ____________________</p>
    <p>이름: ____________________</p>

    <p>
      오늘의 기분:
      □ 😊 좋음
      □ 😐 보통
      □ 😴 피곤함
      □ 😥 걱정됨
    </p>

    <div id="questions"></div>

  </div>

  <script>
    function addQuestion(question) {

      const div = document.getElementById("questions");

      const questionBox = document.createElement("div");

      questionBox.className = "question";

      questionBox.innerHTML = `
        <strong>${question}</strong><br><br>

        ___________________________________________<br><br>

        ___________________________________________<br><br>

        ___________________________________________<br><br>
      `;

      div.appendChild(questionBox);
    }
  </script>

</body>
</html>
