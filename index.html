<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>아침 다이어리 생성기</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 30px;
      background-color: #ffeef3;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,.45) 50%, transparent 50%),
        linear-gradient(rgba(255,255,255,.45) 50%, transparent 50%);
      background-size: 24px 24px;
    }

    h1 {
      text-align: center;
      color: #d85f78;
      font-size: 52px;
      margin-bottom: 10px;
      letter-spacing: -2px;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 45px;
      font-size: 18px;
    }

    h3 {
      color: #c94f68;
      margin-top: 25px;
    }

    .button-area {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 35px;
    }

    button {
      padding: 14px 20px;
      border: none;
      background-color: #d85f78;
      color: white;
      border-radius: 18px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      box-shadow: 0 5px 0 #b94b61;
      transition: 0.2s;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-2px);
      background-color: #e8728a;
    }

    #worksheet {
      max-width: 900px;
      margin: 35px auto;
      background-color: #fffdfd;
      border: 3px solid #d85f78;
      border-radius: 25px;
      padding: 38px;
      box-shadow: 0 8px 18px rgba(216,95,120,0.16);
    }

    #worksheet h2 {
      color: #d85f78;
      font-size: 38px;
      margin-bottom: 25px;
    }

    .date-box {
      color: #d85f78;
      font-weight: bold;
      margin-bottom: 20px;
      font-size: 18px;
    }

    .info {
      margin-bottom: 22px;
      line-height: 2;
      font-size: 18px;
    }

    .question {
      background-color: white;
      border: 2px dashed #d85f78;
      border-radius: 18px;
      padding: 18px;
      margin-top: 18px;
      min-height: 130px;
      line-height: 2;
      font-size: 18px;
      position: relative;
    }

    .question-title {
      color: #d85f78;
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 12px;
    }

    .delete-btn {
      position: absolute;
      right: 12px;
      top: 12px;
      background-color: #f3b4c1;
      box-shadow: none;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 10px;
    }

    .memo-box {
      margin-top: 25px;
      border: 2px dashed #d85f78;
      border-radius: 18px;
      padding: 20px;
      min-height: 100px;
      background-color: #fff7f9;
      font-size: 18px;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      h1, .subtitle, h3, .button-area {
        display: none;
      }

      #worksheet {
        box-shadow: none;
        margin: 0;
        max-width: none;
      }

      .delete-btn {
        display: none;
      }
    }
  </style>
</head>

<body>

  <h1>🐰 아침 다이어리 생성기 🐰</h1>
  <p class="subtitle">오늘의 기분과 생각을 기록해보세요 ✨</p>

  <h3>질문 선택하기</h3>

  <div class="button-area">
    <button onclick="addRandomMoodQuestion()">☁ 기분 질문 랜덤</button>
    <button onclick="addRandomStudyQuestion()">📚 학업 질문 랜덤</button>
    <button onclick="addRandomBoth()">🎲 기분+학업 랜덤</button>
    <button onclick="clearQuestions()">🧹 질문 전체 삭제</button>
    <button onclick="window.print()">🖨 인쇄 / PDF 저장</button>
  </div>

  <div id="worksheet">

    <h2>🌷 오늘의 아침 다이어리 🌷</h2>

    <div class="date-box" id="todayDate"></div>

    <div class="info">
      이름: ____________________
    </div>

    <div class="info">
      오늘의 기분:
      □ 😊 좋음
      □ 😐 보통
      □ 😴 피곤함
      □ 😥 걱정됨
      □ 😍 신남
    </div>

    <div id="questions"></div>

    <div class="memo-box">
      <strong style="color:#d85f78;">memo.</strong>
      <br><br><br><br>
    </div>

  </div>

  <script>
    const moodQuestions = [
      "오늘 아침 내 기분을 날씨로 표현하면 어떤 날씨인가요?",
      "지금 내 마음에 가장 가까운 이모지는 무엇인가요?",
      "오늘 나를 가장 웃게 만들 수 있는 것은 무엇인가요?",
      "요즘 내가 자주 느끼는 감정은 무엇인가요?",
      "오늘 내 마음의 온도를 숫자로 표현하면 몇 도인가요?",
      "오늘 내가 듣고 싶은 말 한마디는 무엇인가요?",
      "오늘 내가 나에게 해주고 싶은 응원의 말은 무엇인가요?",
      "최근에 나를 기분 좋게 만든 작은 일은 무엇인가요?",
      "요즘 나를 조금 힘들게 하는 것은 무엇인가요?",
      "오늘 하루를 편안하게 보내기 위해 필요한 것은 무엇인가요?",
      "내 마음이 충전되는 순간은 언제인가요?",
      "오늘 내가 피하고 싶은 감정은 무엇인가요?",
      "오늘 내가 더 느끼고 싶은 감정은 무엇인가요?",
      "기분이 좋지 않을 때 나를 도와주는 방법은 무엇인가요?",
      "오늘 내 표정을 색깔로 표현하면 무슨 색인가요?",
      "내가 요즘 고마움을 느끼는 사람은 누구인가요?",
      "오늘 하루 중 가장 기대되는 순간은 언제인가요?",
      "오늘 내가 조금 내려놓고 싶은 걱정은 무엇인가요?",
      "지금 내 마음을 한 단어로 표현하면 무엇인가요?",
      "오늘의 나에게 필요한 마음 처방전은 무엇인가요?"
    ];

    const studyQuestions = [
      "오늘 수업에서 꼭 집중하고 싶은 과목은 무엇인가요?",
      "어제 배운 내용 중 기억나는 것은 무엇인가요?",
      "요즘 내가 가장 자신 있는 과목은 무엇인가요?",
      "요즘 내가 조금 어려워하는 과목은 무엇인가요?",
      "오늘 수업 시간에 내가 실천할 작은 목표는 무엇인가요?",
      "공부할 때 나에게 가장 도움이 되는 방법은 무엇인가요?",
      "오늘 수업에서 질문해보고 싶은 내용은 무엇인가요?",
      "내가 공부를 미루게 되는 이유는 무엇인가요?",
      "오늘 해야 할 과제나 준비물은 무엇인가요?",
      "이번 주에 꼭 끝내고 싶은 공부는 무엇인가요?",
      "내가 수업 시간에 더 잘 참여하려면 무엇이 필요할까요?",
      "최근에 내가 이해해서 뿌듯했던 내용은 무엇인가요?",
      "공부할 때 나를 방해하는 것은 무엇인가요?",
      "오늘 노트 필기에서 신경 쓰고 싶은 점은 무엇인가요?",
      "내가 친구에게 설명해줄 수 있는 내용은 무엇인가요?",
      "오늘 수업 후 복습하고 싶은 내용은 무엇인가요?",
      "내가 시험 전에 가장 먼저 준비해야 할 것은 무엇인가요?",
      "오늘 선생님 설명 중 놓치지 않고 싶은 것은 무엇인가요?",
      "나에게 맞는 공부 장소는 어디인가요?",
      "오늘 공부한 나에게 해주고 싶은 칭찬은 무엇인가요?"
    ];

    function setTodayDate() {
      const today = new Date();
      const days = ["일", "월", "화", "수", "목", "금", "토"];
      const text = `${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일 ${days[today.getDay()]}요일`;
      document.getElementById("todayDate").innerText = "날짜: " + text;
    }

    function addQuestion(question) {
      const div = document.getElementById("questions");
      const questionBox = document.createElement("div");

      questionBox.className = "question";

      questionBox.innerHTML = `
        <button class="delete-btn" onclick="this.parentElement.remove()">삭제</button>
        <div class="question-title">${question}</div>
        ___________________________________________
        <br><br>
        ___________________________________________
        <br><br>
        ___________________________________________
      `;

      div.appendChild(questionBox);
    }

    function addRandomMoodQuestion() {
      const random = moodQuestions[Math.floor(Math.random() * moodQuestions.length)];
      addQuestion(random);
    }

    function addRandomStudyQuestion() {
      const random = studyQuestions[Math.floor(Math.random() * studyQuestions.length)];
      addQuestion(random);
    }

    function addRandomBoth() {
      addRandomMoodQuestion();
      addRandomStudyQuestion();
    }

    function clearQuestions() {
      document.getElementById("questions").innerHTML = "";
    }

    setTodayDate();
  </script>

</body>
</html>
